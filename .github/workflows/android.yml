name: Android CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: 1. Check out repository
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 3. Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 4. Run tests for all modules
        run: ./gradlew test

      - name: 5. Run Ktlint Check
        run: ./gradlew ktlintCheck

      - name: 6. Build debug APKs for all modules
        run: ./gradlew assembleDebug

      - name: 7. Upload Mobile App APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-app-debug
          path: mobile/build/outputs/apk/debug/mobile-debug.apk

      - name: 8. Upload Wear OS App APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-debug
          path: wear/build/outputs/apk/debug/wear-debug.apk

      - name: 9. Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"

      - name: 10. Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-*.html"
